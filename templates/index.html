<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Life Planner AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🚀 Life Planner AI</h1>
    <p class="subtitle">Turn your goals into structured success roadmaps</p>

    <form method="POST" class="form">
        <input type="text" name="goal" placeholder="Enter your goal (e.g., Become Cloud Engineer)" required>
        <button type="submit">Generate Roadmap</button>
    </form>

    {% if roadmap %}
    <div class="roadmap-container">
        <h2>📍 Your AI Roadmap</h2>

        <div class="roadmap">
            {{ roadmap }}
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
